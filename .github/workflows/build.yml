name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    # Pinned (not windows-latest): the "Visual Studio 17 2022" generator needs
    # a VS 2022 instance on the image, which windows-latest no longer
    # guarantees since it moved to the 2025 image.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      # The vendored WebView2 (headers + x64 static loader) is committed, so
      # there's no NuGet restore step -- the tree builds as-is.
      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioLinker
          path: build/Release/AudioLinker.exe
          if-no-files-found: error

      # On a v* tag, publish the exe as a downloadable GitHub Release so
      # people can grab it without compiling.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/AudioLinker.exe
          generate_release_notes: true
